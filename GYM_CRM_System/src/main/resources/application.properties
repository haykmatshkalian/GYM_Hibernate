spring.profiles.default=local

server.port=8080
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
spring.jackson.serialization.write-dates-as-timestamps=false

security.default.role=ADMIN

# Base DB fallback (local profile): same main DB (GYM), dedicated local schema.
db.url=${LOCAL_DB_URL:jdbc:postgresql://localhost:5432/GYM?currentSchema=gymcrm_local}
db.username=${LOCAL_DB_USERNAME:postgres}
db.password=${LOCAL_DB_PASSWORD:admin123}

# Initialize profile schemas in the same main database (GYM).
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:profile-schemas.sql
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true
management.endpoint.info.enabled=true
management.prometheus.metrics.export.enabled=true

info.app.name=GYM CRM System
info.app.description=Gym CRM REST API
info.app.version=1.0-SNAPSHOT
